---
version: "2"
run:
  timeout: 5m
linters:
  default: none
  enable:
    - copyloopvar
    - errcheck
    - errorlint
    - goconst
    - gocritic
    - gosec
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unparam
    - unused
  exclusions:
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - path: _test\.go$
        linters:
          - errcheck
          - gosec
formatters:
  enable:
    - gofmt
    - gofumpt
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
